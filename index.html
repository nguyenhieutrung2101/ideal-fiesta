<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World!</title>
  <style>
    :root {
      --bg: #F0EEE6;        /* nền kem ấm đặc trưng của Claude */
      --ink: #1F1E1B;       /* màu chữ chính, gần đen */
      --muted: #6B6862;     /* chữ phụ */
      --accent: #D97757;    /* terracotta / coral – màu nhấn của Claude */
      --accent-dark: #C15F3C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 640px;
      animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 28px;
      color: var(--accent);
      animation: spin 14s linear infinite;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 500;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 18px;
    }

    h1 .dot { color: var(--accent); }

    p {
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 1.6;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .card, .logo { animation: none; }
    }
  </style>
</head>
<body>
  <main class="card">
    <!-- Hình ngôi sao tia kiểu Claude -->
    <svg class="logo" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 1.5c.3 4.2 1.8 6.1 4.4 7.3 1.4.6 3.1 1 6.1 1.2-3 .2-4.7.6-6.1 1.2-2.6 1.2-4.1 3.1-4.4 7.3-.3-4.2-1.8-6.1-4.4-7.3-1.4-.6-3.1-1-6.1-1.2 3-.2 4.7-.6 6.1-1.2C10.2 7.6 11.7 5.7 12 1.5z"/>
    </svg>

    <h1>Hello, World<span class="dot">.</span></h1>
    <p>Một trang landing tĩnh đơn giản, lấy cảm hứng từ phong cách thiết kế của Claude AI.</p>
  </main>
</body>
</html>
